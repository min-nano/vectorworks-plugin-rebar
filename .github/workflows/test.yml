name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  code-quality: write
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # requires-python (>=3.9) の下限と新しめのバージョンで検証する
        python-version: ["3.9", "3.11"]

    steps:
      # サプライチェーン対策: アクションはタグではなくコミット SHA で固定する
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Download VectorWorks official vs.py stub
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/Vectorworks/developer-scripting/main/Python/pages/files/vs.py \
            -o tests/vs.py
          if [ ! -f tests/vs.py ]; then
            echo "Failed to download vs.py"
            exit 1
          fi
          echo "vs.py downloaded successfully"

      - name: Run type check (mypy)
        run: mypy

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=src/vectorworks_plugin_rebar \
            --cov-report=xml:cobertura.xml

      - name: Upload coverage report to GitHub Code Quality
        if: matrix.python-version == '3.11'
        uses: actions/upload-code-coverage@1c15be36fc3733ba839b1dd643bd9556e4426dc1 # v1.4.1
        with:
          file: cobertura.xml
          language: Python
          label: code-coverage/pytest-cov
